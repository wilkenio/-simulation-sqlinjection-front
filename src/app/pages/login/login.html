<div class="container">
  <h2>Login</h2>
  <div class="form-group">
    <label for="username">Username</label>
    <input type="text" id="username" [(ngModel)]="credentials.username" placeholder="Enter username">
  </div>
  <div class="form-group">
    <label for="password">Password</label>
    <input type="password" id="password" [(ngModel)]="credentials.password" placeholder="Enter password">
  </div>
  <button (click)="login()">Login</button>

  <div class="results" *ngIf="request">
    <h3>Request Sent</h3>
    <pre>{{ request | json }}</pre>
  </div>

  <div class="results" *ngIf="response">
    <h3>Response Received</h3>
    <pre>{{ response | json }}</pre>
  </div>
</div>
